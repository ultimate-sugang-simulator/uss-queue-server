version: '3.8'

name: uss-queue

services:
  mysql:
    image: mysql:8.0
    container_name: uss-queue-mysql
    restart: always
    environment:
      MYSQL_DATABASE: uss_queue_db
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Seoul
    ports:
      - "3308:3306"
    volumes:
      - uss_queue_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: uss-queue-redis
    restart: always
    ports:
      - "6391:6379"
    volumes:
      - uss_queue_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  uss_queue_mysql_data:
    driver: local
  uss_queue_redis_data:
    driver: local