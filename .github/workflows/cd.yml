name: USS QUEUE CD

on:
  push:
    branches:
      - main

jobs:
  build:
    name: JAR 생성 후, 도커 허브에 푸쉬
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v6

      - name: Java 17 설정
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: application-prod.yml 환경변수 주입
        uses: microsoft/variable-substitution@v1
        with:
          files: ./src/main/resources/application-prod.yml
        env:
          spring.datasource.url: ${{secrets.DATABASE_URL}}
          spring.datasource.username: ${{secrets.DATABASE_USERNAME}}
          spring.datasource.password: ${{secrets.DATABASE_PASSWORD}}
          spring.data.redis.host: ${{secrets.REDIS_HOST}}

      - name: Gradle 권한 설정
        run: chmod +x ./gradlew

      - name: JAR 빌드
        run: ./gradlew clean build -x test -i --no-daemon

      - name: Docker Hub 로그인
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKER_HUB_USERNAME}}
          password: ${{secrets.DOCKER_HUB_PASSWORD}}

      - name: Docker 이미지 빌드
        run: docker build -f docker/Dockerfile -t ${{ secrets.DOCKER_HUB_USERNAME }}/uss-queue-server:prod .

      - name: Docker 이미지 푸시
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/uss-queue-server:prod

  deploy:
    name: 앱센터 서버에 배포
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v6

      - name: docker-compose-prod 파일 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{secrets.APPCENTER_SERVER_IP}}
          username: ${{secrets.APPCENTER_SERVER_USERNAME}}
          password: ${{secrets.APPCENTER_SERVER_PASSWORD}}
          port: ${{secrets.APPCENTER_SERVER_PORT}}
          source: "docker/docker-compose-prod.yml"
          target: "/home/serverking/uss-queue/prod"
          strip_components: 1

      - name: 배포
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{secrets.APPCENTER_SERVER_IP}}
          username: ${{secrets.APPCENTER_SERVER_USERNAME}}
          password: ${{secrets.APPCENTER_SERVER_PASSWORD}}
          port: ${{secrets.APPCENTER_SERVER_PORT}}
          script: |
            cd /home/serverking/uss-queue/prod

            echo "DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}" > .env

            docker-compose -f docker-compose-prod.yml down
            docker-compose -f docker-compose-prod.yml pull
            docker-compose -f docker-compose-prod.yml up -d
            docker image prune -f
